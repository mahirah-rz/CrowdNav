<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Email Confirmed - CrowdNav</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
      background: #effaf1;
      color: #0f4d3f;
      text-align: center;
    }

    .card {
      background: white;
      padding: 36px 28px;
      border-radius: 22px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.12);
      max-width: 360px;
      width: 90%;
    }

    .icon {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: #31c96f;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 42px;
      margin: 0 auto 18px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 28px;
    }

    p {
      margin: 0;
      color: #4a625c;
      font-size: 16px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">✓</div>
    <h1>Email confirmed</h1>
    <p>Your CrowdNav account email has been confirmed. You can now return to the app and login.</p>
  </div>
</body>
</html>
