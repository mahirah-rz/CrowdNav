name: crowdnav
description: CrowdNav - Smart Campus Mobility System for Leading University
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'


dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6

  # Backend
  supabase_flutter: ^2.3.0

  # UI
  google_fonts: ^8.1.0
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1

  # Maps & Location
  flutter_map: ^7.0.0
  latlong2: ^0.9.0
  geolocator: ^13.0.0
  geocoding: ^3.0.0

  # Networking
  http: ^1.6.0

  # Firebase
  firebase_core: ^3.0.0
  firebase_messaging: ^15.0.0
  flutter_local_notifications: ^17.2.3
  google_sign_in: ^6.0.0

  # Device features
  image_picker: ^1.1.2
  permission_handler: ^11.3.0
  connectivity_plus: ^6.0.1

  # Utilities
  shared_preferences: ^2.2.2
  intl: ^0.19.0
  url_launcher: ^6.2.5
  collection: ^1.19.0

  




  


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true